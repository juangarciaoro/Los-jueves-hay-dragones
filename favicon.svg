<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo oscuro -->
  <rect width="32" height="32" rx="5" fill="#0d0b04"/>
  <!-- Hexágono d20 -->
  <polygon points="16,2 29.5,9.5 29.5,22.5 16,30 2.5,22.5 2.5,9.5"
    fill="#1a1408" stroke="#c9a84c" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Cara superior del d20: triángulo central -->
  <polyline points="2.5,9.5 16,13.5 29.5,9.5"
    fill="none" stroke="#8c7030" stroke-width="1"/>
  <line x1="16" y1="2" x2="16" y2="13.5" stroke="#8c7030" stroke-width="1"/>
  <!-- Aristas bajas -->
  <line x1="16" y1="13.5" x2="2.5" y2="22.5" stroke="#8c7030" stroke-width="0.8"/>
  <line x1="16" y1="13.5" x2="29.5" y2="22.5" stroke="#8c7030" stroke-width="0.8"/>
  <line x1="16" y1="13.5" x2="16" y2="30" stroke="#8c7030" stroke-width="0.8"/>
  <!-- Número 20 -->
  <text x="16" y="26.5" text-anchor="middle"
    font-family="Georgia,serif" font-size="8.5" font-weight="bold" fill="#f0d87a">20</text>
</svg>
